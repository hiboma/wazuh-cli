name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions: {}

jobs:
  build-release:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cross build --release --target "${BUILD_TARGET}"

      - name: Build (native)
        if: "!matrix.cross"
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "${BUILD_TARGET}"

      - name: Package (unix)
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE_NAME="wazuh-cli-${TARGET}"
          mkdir "${ARCHIVE_NAME}"
          cp "target/${TARGET}/release/wazuh-cli" "${ARCHIVE_NAME}/"
          cp LICENSE README.md "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          $archiveName = "wazuh-cli-${env:TARGET}"
          New-Item -ItemType Directory -Path $archiveName
          Copy-Item "target\${env:TARGET}\release\wazuh-cli.exe" $archiveName
          Copy-Item LICENSE, README.md $archiveName
          Compress-Archive -Path $archiveName -DestinationPath "${archiveName}.zip"

      - name: Upload artifact (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wazuh-cli-${{ matrix.target }}
          path: wazuh-cli-${{ matrix.target }}.tar.gz

      - name: Upload artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wazuh-cli-${{ matrix.target }}
          path: wazuh-cli-${{ matrix.target }}.zip

  create-release:
    needs: build-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} . \;
          sha256sum *.tar.gz *.zip > sha256sums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/wazuh-cli-*.tar.gz, artifacts/wazuh-cli-*.zip'

      - name: Create draft release with assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/wazuh-cli-*.tar.gz
            artifacts/wazuh-cli-*.zip
            artifacts/sha256sums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release edit "${TAG_NAME}" --draft=false
